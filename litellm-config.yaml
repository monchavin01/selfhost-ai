# LiteLLM gateway config
# User-facing. This service does not switch profiles; it only routes and guards.

model_list:
  # Switchable profiles — all point to the same backend URL.
  # The profile_guard hook rejects requests that don't match the active profile.
  - model_name: fast
    litellm_params:
      model: openai/main-model
      api_base: http://vllm-main:8000/v1
      api_key: dummy
    model_info:
      mode: chat

  - model_name: coder
    litellm_params:
      model: openai/main-model
      api_base: http://vllm-main:8000/v1
      api_key: dummy
    model_info:
      mode: chat
      supports_function_calling: true

  - model_name: reason
    litellm_params:
      model: openai/main-model
      api_base: http://vllm-main:8000/v1
      api_key: dummy
    model_info:
      mode: chat

  - model_name: smart
    litellm_params:
      model: openai/main-model
      api_base: http://vllm-main:8000/v1
      api_key: dummy
    model_info:
      mode: chat

  # Autocomplete — separate backend, always available when fast/coder/reason active
  - model_name: coding-fast
    litellm_params:
      model: openai/qwen-fim-1.5b
      api_base: http://vllm-fim:8000/v1
      api_key: dummy
    model_info:
      mode: completion

  # Local CPU-only profile for Mac/no-GPU testing
  - model_name: local
    litellm_params:
      model: openai/main-model
      api_base: http://vllm-main:8000/v1
      api_key: dummy
    model_info:
      mode: chat

  # Free external frontier
  - model_name: coding-smart
    litellm_params:
      model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
      api_key: os.environ/OPENROUTER_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  callbacks: hooks.profile_guard.proxy_handler_instance

litellm_settings:
  drop_params: true
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    password: os.environ/REDIS_PASSWORD
  request_timeout: 300
