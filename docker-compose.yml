# Coding Stack — services definition
#
# Two control planes:
#   User plane  : litellm (:4000) — no Docker access, read-only state
#   Admin plane : admin-api (:8080, loopback) — the only one that can switch
#
# Model profiles (one at a time, activated via make switch):
#   fast, coder, reason, smart

# Explicit project name so admin-api (which mounts this file at /workspace)
# uses the same name as the host. Without this, Docker Compose infers the name
# from the directory — "selfhost-stack" on host vs "workspace" inside the
# container — causing container name conflicts on every profile switch.
name: selfhost-stack

services:
  # ============================================================
  # USER PLANE
  # ============================================================
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
      - ./hooks:/app/hooks:ro
      - ./state:/state:ro
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - DATABASE_URL=postgresql://litellm:${PG_PASSWORD}@postgres:5432/litellm
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-dummy}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=http://langfuse:3000
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - PYTHONPATH=/app
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stack

  # ============================================================
  # ADMIN PLANE — loopback only, separate auth token
  # ============================================================
  admin-api:
    build: ./admin-api
    container_name: admin-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - ADMIN_TOKEN=${ADMIN_TOKEN}
    volumes:
      - ./state:/state
      - ./:/workspace:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - stack

  # ============================================================
  # DATA + OBSERVABILITY
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 1gb --maxmemory-policy allkeys-lru
    networks:
      - stack

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=litellm
      - POSTGRES_PASSWORD=${PG_PASSWORD}
      - POSTGRES_DB=litellm
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - stack

  langfuse:
    image: langfuse/langfuse:3
    container_name: langfuse
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - ENCRYPTION_KEY=${LANGFUSE_ENCRYPTION_KEY}
      - SALT=${LANGFUSE_SALT}
      - DATABASE_URL=postgresql://langfuse:${LANGFUSE_PG_PASSWORD}@langfuse-postgres:5432/langfuse
      - CLICKHOUSE_URL=http://langfuse-clickhouse:8123
      - CLICKHOUSE_MIGRATION_URL=clickhouse://${LANGFUSE_CLICKHOUSE_USER}:${LANGFUSE_CLICKHOUSE_PASSWORD}@langfuse-clickhouse:9000
      - CLICKHOUSE_USER=${LANGFUSE_CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${LANGFUSE_CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_CLUSTER_ENABLED=false
      - REDIS_HOST=langfuse-redis
      - REDIS_PORT=6379
      - REDIS_AUTH=${LANGFUSE_REDIS_AUTH}
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_EVENT_UPLOAD_REGION=auto
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=${LANGFUSE_MINIO_USER}
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=${LANGFUSE_MINIO_PASSWORD}
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://langfuse-minio:9000
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_EVENT_UPLOAD_PREFIX=events/
      - LANGFUSE_S3_MEDIA_UPLOAD_BUCKET=langfuse
      - LANGFUSE_S3_MEDIA_UPLOAD_REGION=auto
      - LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID=${LANGFUSE_MINIO_USER}
      - LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY=${LANGFUSE_MINIO_PASSWORD}
      - LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT=http://langfuse-minio:9000
      - LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_MEDIA_UPLOAD_PREFIX=media/
      - NEXTAUTH_URL=${LANGFUSE_URL:-http://localhost:3000}
      - NEXT_PUBLIC_ENABLE_SIGNUP=${LANGFUSE_ENABLE_SIGNUP:-true}
      - TELEMETRY_ENABLED=false
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=false
      - LANGFUSE_INIT_ORG_ID=${LANGFUSE_INIT_ORG_ID:-}
      - LANGFUSE_INIT_ORG_NAME=${LANGFUSE_INIT_ORG_NAME:-}
      - LANGFUSE_INIT_PROJECT_ID=${LANGFUSE_INIT_PROJECT_ID:-}
      - LANGFUSE_INIT_PROJECT_NAME=${LANGFUSE_INIT_PROJECT_NAME:-}
      - LANGFUSE_INIT_PROJECT_PUBLIC_KEY=${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-}
      - LANGFUSE_INIT_PROJECT_SECRET_KEY=${LANGFUSE_INIT_PROJECT_SECRET_KEY:-}
      - LANGFUSE_INIT_USER_EMAIL=${LANGFUSE_INIT_USER_EMAIL:-}
      - LANGFUSE_INIT_USER_NAME=${LANGFUSE_INIT_USER_NAME:-}
      - LANGFUSE_INIT_USER_PASSWORD=${LANGFUSE_INIT_USER_PASSWORD:-}
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
    networks:
      - stack

  langfuse-postgres:
    image: postgres:17-alpine
    container_name: langfuse-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=${LANGFUSE_PG_PASSWORD}
      - POSTGRES_DB=langfuse
      - TZ=UTC
      - PGTZ=UTC
    volumes:
      - langfuse-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - stack

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: langfuse-clickhouse
    restart: unless-stopped
    user: "101:101"
    environment:
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_USER=${LANGFUSE_CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${LANGFUSE_CLICKHOUSE_PASSWORD}
    volumes:
      - langfuse-clickhouse-data:/var/lib/clickhouse
      - langfuse-clickhouse-logs:/var/log/clickhouse-server
      - ./langfuse/clickhouse-config.xml:/etc/clickhouse-server/config.d/config.xml:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s
    networks:
      - stack

  langfuse-minio:
    image: minio/minio:latest
    container_name: langfuse-minio
    restart: unless-stopped
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      - MINIO_ROOT_USER=${LANGFUSE_MINIO_USER}
      - MINIO_ROOT_PASSWORD=${LANGFUSE_MINIO_PASSWORD}
    volumes:
      - langfuse-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 1s
      timeout: 5s
      retries: 5
      start_period: 1s
    networks:
      - stack

  langfuse-redis:
    image: redis:7-alpine
    container_name: langfuse-redis
    restart: unless-stopped
    command: >
      --requirepass ${LANGFUSE_REDIS_AUTH}
      --maxmemory-policy noeviction
    volumes:
      - langfuse-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$LANGFUSE_REDIS_AUTH\" ping"]
      interval: 3s
      timeout: 10s
      retries: 10
    networks:
      - stack

  # ============================================================
  # AUTOCOMPLETE (runs alongside fast/coder/reason)
  # ============================================================
  vllm-fim:
    image: vllm/vllm-openai:latest
    container_name: vllm-fim
    profiles: ["fast", "coder", "reason"]
    restart: unless-stopped
    ipc: host
    volumes:
      - hf-cache:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    command: >
      --model Qwen/Qwen2.5-Coder-1.5B
      --dtype float16
      --max-model-len 8192
      --gpu-memory-utilization 0.12
      --max-num-seqs 16
      --enable-prefix-caching
      --served-model-name qwen-fim-1.5b
    networks:
      - stack

  # ============================================================
  # PROFILE: fast — GPT-OSS 20B
  # ============================================================
  vllm-fast:
    image: vllm/vllm-openai:latest
    container_name: vllm-main
    profiles: ["fast"]
    restart: unless-stopped
    ipc: host
    volumes:
      - hf-cache:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    command: >
      --model openai/gpt-oss-20b
      --dtype auto
      --max-model-len 32768
      --gpu-memory-utilization 0.82
      --max-num-seqs 6
      --enable-prefix-caching
      --enable-chunked-prefill
      --kv-cache-dtype fp8
      --served-model-name main-model
    networks:
      - stack

  # ============================================================
  # PROFILE: coder — Qwen3-Coder 30B-A3B
  # ============================================================
  llama-coder:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: vllm-main
    profiles: ["coder"]
    restart: unless-stopped
    volumes:
      - hf-cache:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    command: >
      -hf unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF:UD-Q4_K_XL
      --host 0.0.0.0 --port 8000
      --api-key dummy
      --ctx-size 65536
      --n-gpu-layers 99
      --flash-attn
      --cache-type-k q8_0 --cache-type-v q8_0
      --alias main-model
      --jinja
      --parallel 3
    networks:
      - stack

  # ============================================================
  # PROFILE: reason — Nemotron 3 Nano 30B-A3B
  # ============================================================
  llama-reason:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: vllm-main
    profiles: ["reason"]
    restart: unless-stopped
    volumes:
      - hf-cache:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    command: >
      -hf unsloth/Nemotron-3-Nano-30B-A3B-GGUF:UD-Q4_K_XL
      --host 0.0.0.0 --port 8000
      --api-key dummy
      --ctx-size 131072
      --n-gpu-layers 99
      --flash-attn
      --cache-type-k q8_0 --cache-type-v q8_0
      --temp 0.6 --top-p 0.95 --min-p 0.01
      --alias main-model
      --jinja
      --parallel 2
    networks:
      - stack

  # ============================================================
  # PROFILE: smart — GLM-4.5-Air Q3 (partial CPU offload)
  # ============================================================
  llama-smart:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: vllm-main
    profiles: ["smart"]
    restart: unless-stopped
    volumes:
      - hf-cache:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    command: >
      -hf unsloth/GLM-4.5-Air-GGUF:UD-Q3_K_XL
      --host 0.0.0.0 --port 8000
      --api-key dummy
      --ctx-size 32768
      --n-gpu-layers 99
      --n-cpu-moe 36
      --flash-attn
      --cache-type-k q8_0 --cache-type-v q8_0
      --alias main-model
      --jinja
      --parallel 1
    networks:
      - stack


networks:
  stack:
    name: coding-stack

volumes:
  hf-cache:
  redis-data:
  pg-data:
  langfuse-pg-data:
  langfuse-clickhouse-data:
  langfuse-clickhouse-logs:
  langfuse-minio-data:
  langfuse-redis-data:
